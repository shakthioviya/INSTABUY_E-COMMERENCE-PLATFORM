<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{margin:0;font-family:'Segoe UI';}

.container-main{display:flex;height:100vh;}

.left{
    width:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f6f8;
}

.form-box{
    width:350px;
    padding:40px;
    border-radius:15px;
    background:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.right{
    width:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#36d1dc,#5b86e5);
}

.right img{
    width:70%;
    max-width:400px;
}
</style>

</head>

<body>

<div class="container-main">

<!-- LEFT -->
<div class="left">
    <div class="form-box">

        <h5 class="text-success">Create Account</h5>
        <h2 class="mb-3">Sign Up</h2>

        <input id="email" class="form-control mb-3" placeholder="Email">
        <input id="pass" type="password" class="form-control mb-3" placeholder="Password">

        <button class="btn btn-success w-100 mb-3" onclick="signup()">Signup</button>

        <p>
            Already have account? <a href="login.html">Login</a>
        </p>

        <div id="msg"></div>

    </div>
</div>

<!-- RIGHT -->
<div class="right">
    <img src="images/images5.jpg">
</div>

</div>

<script>

function signup(){

let email = document.getElementById("email").value;
let pass = document.getElementById("pass").value;

// save user
localStorage.setItem("user", JSON.stringify({
    email: email,
    password: pass
}));

document.getElementById("msg").innerHTML =
"<div class='text-success'>Signup successful</div>";

setTimeout(()=>{
    window.location.href="login.html";
},1000);

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Product Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f1f3f6;
}

.box{
    background:white;
    padding:20px;
    margin-top:30px;
    border-radius:10px;
}

img{
    width:100%;
    height:300px;
    object-fit:cover;
}
</style>
</head>

<body>

<div class="container">

<div class="box">

<div class="row">

<div class="col-md-5">
    <img id="img">
</div>

<div class="col-md-7">

    <h3 id="name"></h3>
    <h4 id="price" class="text-success"></h4>

    <h5>Features:</h5>
    <ul id="features"></ul>

    <button class="btn btn-warning mt-3" onclick="buy()">
        Buy Now
    </button>

    <div id="res" class="mt-3"></div>

</div>

</div>

</div>

</div>

<script>

const products = {
    Laptop:{
        price:50000,
        img:"images/images1.jpg",
        features:["HP/Dell","16GB RAM","512GB SSD","i7 Processor"]
    },
    Mobile:{
        price:20000,
        img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9",
        features:["Samsung","5G","8GB RAM","128GB Storage"]
    },
    Headphones:{
        price:1500,
        img:"https://images.unsplash.com/photo-1518449037197-3fefc1c0bfa4",
        features:["Noise Cancelling","Bluetooth","20hr Battery"]
    }
};

const params = new URLSearchParams(window.location.search);
const name = params.get("name");

const product = products[name];

document.getElementById("name").innerText = name;
document.getElementById("price").innerText = "₹" + product.price;
document.getElementById("img").src = product.img;

let f="";
product.features.forEach(x=>f+="<li>"+x+"</li>");
document.getElementById("features").innerHTML=f;

// BUY
function buy(){

fetch("http://localhost:8085/api/orders",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
    productName:name,
    quantity:1
})
})
.then(res=>{
if(!res.ok) throw new Error();
return res.json();
})
.then(data=>{
document.getElementById("res").innerHTML=`
<div class="alert alert-success">
✅ Order Placed <br>
Order ID: ${data.id} <br>
Amount: ${data.totalAmount}
</div>`;
})
.catch(()=>{
document.getElementById("res").innerHTML=`
<div class="alert alert-danger">
 Failed (Out of Stock / Payment Failed)
</div>`;
});
}

</script>

</body>
</html>
